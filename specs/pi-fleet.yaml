# BlackRoad Pi Fleet — Hardware Specifications
# Source of truth for all compute nodes
#
# FOR LIVE DATA: Run the scan script
#   ./scripts/fleet-scan.sh
#
# This file defines WHAT we own. Live status comes from the scan.

fleet:

  alice:
    model: "Raspberry Pi 5"
    ram: "8GB"
    case: "Standard"
    storage:
      - type: microSD
        capacity: "16GB"
    role: GATEWAY
    services:
      - nginx (37 sites)
      - Pi-hole (DNS filtering)
      - PostgreSQL
      - Qdrant (vector search)
      - Redis (cache)

  cecilia:
    model: "Raspberry Pi 5"
    ram: "8GB"
    case: "Pironman 5-MAX (Dual NVMe, OLED, RGB fans, safe shutdown)"
    storage:
      - type: microSD
      - type: NVMe
        model: "Crucial P310 1TB"
        interface: "PCIe Gen4"
    accelerator:
      model: "Hailo-8"
      tops: 26
      interface: "M.2"
    role: INFERENCE
    services:
      - Ollama (16 models)
      - MinIO (4 buckets)
      - PostgreSQL
      - InfluxDB
      - Hailo-8 inference

  octavia:
    model: "Raspberry Pi 5"
    ram: "8GB"
    case: "Pironman 5-MAX (Dual NVMe, OLED, RGB fans, safe shutdown)"
    storage:
      - type: microSD
        capacity: "128GB"
      - type: NVMe
        model: "Crucial P310 1TB"
        interface: "PCIe Gen4"
    accelerator:
      model: "Hailo-8"
      tops: 26
      interface: "M.2"
    role: PLATFORM
    services:
      - Gitea (273 repos)
      - Docker Swarm
      - NATS v2.12.3
      - 15 Workers (workerd)
      - Deploy API (PaaS)
      - Hailo-8 inference

  aria:
    model: "Raspberry Pi 5"
    ram: "8GB"
    case: "ElectroCookie Aluminum Mini Tower (RGB ambient light, cooling fan)"
    role: MONITORING
    services:
      - Headscale
      - Cloudflared
      - nginx
      - InfluxDB
      - Portainer

  lucidia:
    model: "Raspberry Pi 5"
    ram: "8GB"
    case: "ElectroCookie Aluminum Mini Tower (RGB ambient light, cooling fan)"
    storage:
      - type: microSD
        capacity: "256GB"
      - type: USB
        model: "SanDisk Extreme 1TB"
    role: APPS
    services:
      - nginx (530+ web apps)
      - PowerDNS
      - Ollama (6 models)
      - GitHub Actions runners

  remote-control-server:
    model: "Raspberry Pi 4 Model B"
    ram: "2GB"
    case: "FPVERA Remote Control Server (ATX, HDMI capture, PoE, OLED)"
    role: REMOTE_MANAGEMENT

  pi400:
    model: "Raspberry Pi 400 Computer Kit"
    ram: "4GB"
    role: WORKSTATION

  pi-zero-2wh:
    model: "Raspberry Pi Zero 2 WH Kit"
    role: IOT_EDGE

  pi-zero-w:
    model: "Raspberry Pi Zero W (Black Case)"
    role: IOT_EDGE

  gematria:
    provider: "DigitalOcean"
    region: "nyc3"
    role: EDGE
    services:
      - Caddy (151 domains)
      - Ollama (6 models)
      - PowerDNS (ns1)
      - WireGuard hub

  anastasia:
    provider: "DigitalOcean"
    region: "nyc1"
    role: BACKUP
    services:
      - Caddy
      - WireGuard

  alexandria:
    model: "MacBook Pro M1 2020"
    ram: "16GB"
    storage: "500GB SSD"
    role: FOUNDER_WORKSTATION
