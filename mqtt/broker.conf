# BlackRoad Pi Sensor Mesh — Mosquitto MQTT Broker Configuration
# Place at: /etc/mosquitto/mosquitto.conf

# ── Listener ─────────────────────────────────────────────────────────────────

listener 1883 0.0.0.0
protocol mqtt

# TLS listener for external connections
listener 8883 0.0.0.0
protocol mqtt
certfile /etc/mosquitto/certs/server.crt
keyfile  /etc/mosquitto/certs/server.key
cafile   /etc/mosquitto/certs/ca.crt
tls_version tlsv1.3

# WebSocket listener for browser clients
listener 9001 0.0.0.0
protocol websockets

# ── Authentication ────────────────────────────────────────────────────────────

allow_anonymous false
password_file   /etc/mosquitto/passwd

# ACL: restrict per-node topics
acl_file /etc/mosquitto/acl

# ── Persistence ───────────────────────────────────────────────────────────────

persistence         true
persistence_location /var/lib/mosquitto/

# ── Logging ───────────────────────────────────────────────────────────────────

log_dest    file /var/log/mosquitto/mosquitto.log
log_type    error
log_type    warning
log_type    notice
log_type    information
log_timestamp true
log_timestamp_format %Y-%m-%dT%H:%M:%S

# ── Bridging — publish Pi sensor data to cloud broker ────────────────────────

connection blackroad-cloud-bridge
address     mqtt.blackroad.io:8883
topic       blackroad/fleet/# both 1
remote_username ${CLOUD_MQTT_USER}
remote_password ${CLOUD_MQTT_PASS}
bridge_cafile   /etc/mosquitto/certs/cloud-ca.crt
try_private     false
cleansession    true
